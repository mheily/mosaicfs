<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MosaicFS — Database Connection</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 14px;
    background: #f5f5f7;
    color: #1d1d1f;
    margin: 0;
    padding: 28px 24px 24px;
  }
  h2 { margin: 0 0 4px; font-size: 17px; font-weight: 600; }
  p.subtitle { margin: 0 0 20px; color: #6e6e73; font-size: 13px; }
  label { display: block; margin-bottom: 14px; }
  label span { display: block; font-weight: 500; margin-bottom: 4px; font-size: 12px; color: #3a3a3c; }
  input {
    width: 100%; padding: 7px 10px;
    border: 1px solid #c7c7cc; border-radius: 6px;
    font-size: 14px; outline: none;
    background: #fff;
  }
  input:focus { border-color: #0071e3; box-shadow: 0 0 0 3px rgba(0,113,227,.15); }
  .row { display: flex; gap: 10px; }
  .row label { flex: 1; }
  button {
    width: 100%; padding: 9px;
    background: #0071e3; color: #fff;
    border: none; border-radius: 8px;
    font-size: 14px; font-weight: 500;
    cursor: pointer; margin-top: 8px;
  }
  button:hover:not(:disabled) { background: #0077ed; }
  button:disabled { background: #a0c4f0; cursor: default; }
  button.secondary { background: #e5e5ea; color: #1d1d1f; }
  button.secondary:hover:not(:disabled) { background: #d8d8dd; }
  button.secondary:disabled { background: #efeff2; color: #a0a0a5; }
  .status {
    margin-top: 10px; padding: 8px 10px;
    border-radius: 6px; font-size: 12px;
    display: none;
  }
  .status.error {
    background: #fff2f2; border: 1px solid #ffc9c9; color: #c0392b;
  }
  .status.ok {
    background: #effaf1; border: 1px solid #b9e6c4; color: #1a7a3a;
  }
  .status.ok::before {
    content: "✓ ";
    font-weight: 700;
  }
</style>
</head>
<body>
<h2>Database Connection</h2>
<p class="subtitle">MosaicFS stores metadata in CouchDB. Enter the connection details below.</p>

<form id="form">
  <label>
    <span>CouchDB URL</span>
    <input type="text" id="url" placeholder="http://localhost:5984" required autocomplete="off">
  </label>
  <div class="row">
    <label>
      <span>Username</span>
      <input type="text" id="user" placeholder="admin" required autocomplete="off">
    </label>
    <label>
      <span>Password</span>
      <input type="password" id="password" placeholder="changeme" required autocomplete="off">
    </label>
  </div>
  <div id="status" class="status"></div>
  <button type="button" id="test-btn" class="secondary" disabled>Test connection</button>
  <button type="submit" id="save-btn" disabled>Save &amp; Connect</button>
</form>

<script>
const invoke = window.__TAURI__.core.invoke;

const urlEl    = document.getElementById('url');
const userEl   = document.getElementById('user');
const passEl   = document.getElementById('password');
const testBtn  = document.getElementById('test-btn');
const saveBtn  = document.getElementById('save-btn');
const statusEl = document.getElementById('status');

let testedOk = false;

function setStatus(kind, message) {
  if (!kind) {
    statusEl.style.display = 'none';
    statusEl.className = 'status';
    statusEl.textContent = '';
  } else {
    statusEl.style.display = 'block';
    statusEl.className = 'status ' + kind;
    statusEl.textContent = message;
  }
}

function refreshButtons() {
  const allFilled = urlEl.value.trim() && userEl.value.trim() && passEl.value.trim();
  testBtn.disabled = !allFilled || testBtn.dataset.busy === '1';
  saveBtn.disabled = !testedOk || saveBtn.dataset.busy === '1';
}

function invalidateTest() {
  if (testedOk) {
    testedOk = false;
    setStatus(null);
  }
  refreshButtons();
}

[urlEl, userEl, passEl].forEach(el => {
  el.addEventListener('input', invalidateTest);
});

invoke('get_settings').then(s => {
  if (s.couchdb_url)      urlEl.value  = s.couchdb_url;
  if (s.couchdb_user)     userEl.value = s.couchdb_user;
  if (s.couchdb_password) passEl.value = s.couchdb_password;
  refreshButtons();
}).catch(() => refreshButtons());

testBtn.addEventListener('click', async () => {
  testBtn.dataset.busy = '1';
  testBtn.textContent = 'Testing…';
  setStatus(null);
  refreshButtons();
  try {
    const normalized = await invoke('test_connection', {
      couchdbUrl:      urlEl.value,
      couchdbUser:     userEl.value,
      couchdbPassword: passEl.value,
    });
    if (normalized && normalized !== urlEl.value) {
      urlEl.value = normalized;
    }
    testedOk = true;
    setStatus('ok', 'Connection successful');
  } catch (e) {
    testedOk = false;
    setStatus('error', String(e));
  } finally {
    delete testBtn.dataset.busy;
    testBtn.textContent = 'Test connection';
    refreshButtons();
  }
});

document.getElementById('form').addEventListener('submit', async e => {
  e.preventDefault();
  if (!testedOk) return;
  saveBtn.dataset.busy = '1';
  saveBtn.textContent = 'Saving…';
  refreshButtons();
  try {
    await invoke('save_settings', {
      couchdbUrl:      urlEl.value,
      couchdbUser:     userEl.value,
      couchdbPassword: passEl.value,
    });
    saveBtn.textContent = 'Saved';
  } catch (e) {
    setStatus('error', String(e));
    delete saveBtn.dataset.busy;
    saveBtn.textContent = 'Save & Connect';
    refreshButtons();
  }
});
</script>
</body>
</html>
