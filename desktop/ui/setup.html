<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MosaicFS — Database Connection</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 14px;
    background: #f5f5f7;
    color: #1d1d1f;
    margin: 0;
    padding: 28px 24px 24px;
  }
  h2 { margin: 0 0 4px; font-size: 17px; font-weight: 600; }
  p.subtitle { margin: 0 0 20px; color: #6e6e73; font-size: 13px; }
  label { display: block; margin-bottom: 14px; }
  label span { display: block; font-weight: 500; margin-bottom: 4px; font-size: 12px; color: #3a3a3c; }
  input {
    width: 100%; padding: 7px 10px;
    border: 1px solid #c7c7cc; border-radius: 6px;
    font-size: 14px; outline: none;
    background: #fff;
  }
  input:focus { border-color: #0071e3; box-shadow: 0 0 0 3px rgba(0,113,227,.15); }
  .row { display: flex; gap: 10px; }
  .row label { flex: 1; }
  button {
    width: 100%; padding: 9px;
    background: #0071e3; color: #fff;
    border: none; border-radius: 8px;
    font-size: 14px; font-weight: 500;
    cursor: pointer; margin-top: 8px;
  }
  button:hover { background: #0077ed; }
  button:disabled { background: #a0c4f0; cursor: default; }
  .error {
    margin-top: 10px; padding: 8px 10px;
    background: #fff2f2; border: 1px solid #ffc9c9;
    border-radius: 6px; color: #c0392b; font-size: 12px;
    display: none;
  }
</style>
</head>
<body>
<h2>Database Connection</h2>
<p class="subtitle">MosaicFS stores metadata in CouchDB. Enter the connection details below.</p>

<form id="form">
  <label>
    <span>CouchDB URL</span>
    <input type="url" id="url" placeholder="http://localhost:5984" required>
  </label>
  <div class="row">
    <label>
      <span>Username</span>
      <input type="text" id="user" placeholder="admin" required>
    </label>
    <label>
      <span>Password</span>
      <input type="password" id="password" placeholder="changeme" required>
    </label>
  </div>
  <div class="error" id="error"></div>
  <button type="submit" id="btn">Save &amp; Connect</button>
</form>

<script>
const invoke = window.__TAURI__.core.invoke;

invoke('get_settings').then(s => {
  if (s.couchdb_url)      document.getElementById('url').value      = s.couchdb_url;
  if (s.couchdb_user)     document.getElementById('user').value     = s.couchdb_user;
  if (s.couchdb_password) document.getElementById('password').value = s.couchdb_password;
}).catch(() => {});

document.getElementById('form').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('btn');
  const err = document.getElementById('error');
  btn.disabled = true;
  btn.textContent = 'Saving…';
  err.style.display = 'none';
  try {
    await invoke('save_settings', {
      couchdbUrl:      document.getElementById('url').value,
      couchdbUser:     document.getElementById('user').value,
      couchdbPassword: document.getElementById('password').value,
    });
    btn.textContent = 'Saved';
  } catch (e) {
    err.textContent = String(e);
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Save & Connect';
  }
});
</script>
</body>
</html>
