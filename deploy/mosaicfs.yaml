# MosaicFS All-in-One Deployment (CouchDB + unified `mosaicfs` binary)
# Compatible with: podman kube play
#
# Usage:
#   podman kube play deploy/mosaicfs.yaml
#
# ── Before deploying ─────────────────────────────────────────────────────────
#
# Create /etc/mosaicfs on the host:
#
#   sudo mkdir -p /etc/mosaicfs
#   sudo chmod 700 /etc/mosaicfs
#
# 1. /etc/mosaicfs/couchdb.env — sourced into the CouchDB container:
#
#      COUCHDB_USER=admin
#      COUCHDB_PASSWORD=changeme
#
#    sudo chmod 600 /etc/mosaicfs/couchdb.env
#
# 2. /etc/mosaicfs/mosaicfs.toml — copy mosaicfs.toml.example and edit.
#    Enable the features this node should run (agent, vfs, web_ui). The
#    [couchdb] section's password is also overridable via the COUCHDB_PASSWORD
#    env var if you want to keep it out of the TOML file.
#
#    sudo chmod 600 /etc/mosaicfs/mosaicfs.toml
#
# 3. Replace /data/mosaicfs-test below with the directory you want the
#    agent to index, and update [agent].watch_paths in mosaicfs.toml to
#    match.
#
# ─────────────────────────────────────────────────────────────────────────────
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: couchdb-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mosaicfs-state
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: mosaicfs
  labels:
    app: mosaicfs
spec:
  restartPolicy: Always
  containers:
    - name: couchdb
      image: docker.io/couchdb:3
      command: ["sh", "-c"]
      args:
        - set -a; . /etc/mosaicfs/couchdb.env; set +a;
          exec /docker-entrypoint.sh /opt/couchdb/bin/couchdb
      ports:
        # Bound to localhost only — not exposed on the network.
        # Access Fauxton via SSH tunnel: ssh -L 5984:localhost:5984 <nas>
        - containerPort: 5984
          hostPort: 5984
          hostIP: 127.0.0.1
          protocol: TCP
      volumeMounts:
        - name: mosaicfs-config
          mountPath: /etc/mosaicfs
          readOnly: true
        - name: couchdb-data
          mountPath: /opt/couchdb/data
      livenessProbe:
        httpGet:
          path: /_up
          port: 5984
        initialDelaySeconds: 15
        periodSeconds: 10
        failureThreshold: 6
      readinessProbe:
        httpGet:
          path: /_up
          port: 5984
        initialDelaySeconds: 15
        periodSeconds: 5
        failureThreshold: 3
      resources:
        requests:
          memory: 512Mi
          cpu: "0.5"
        limits:
          memory: 2Gi
          cpu: "2"

    - name: mosaicfs
      image: localhost/mosaicfs:latest
      command: ["sh", "-c"]
      # Source COUCHDB_URL so the [couchdb] section in mosaicfs.toml doesn't
      # need to hardcode the loopback URL — each deployment can override.
      args:
        - export COUCHDB_URL=http://localhost:5984;
          set -a; . /etc/mosaicfs/couchdb.env; set +a;
          exec /usr/local/bin/mosaicfs --config /etc/mosaicfs/mosaicfs.toml
      ports:
        - containerPort: 8443
          hostPort: 8443
          protocol: TCP
      volumeMounts:
        - name: mosaicfs-config
          mountPath: /etc/mosaicfs
          readOnly: true
        - name: mosaicfs-state
          mountPath: /var/lib/mosaicfs
        - name: data
          mountPath: /data/mosaicfs-test
          readOnly: true
      livenessProbe:
        tcpSocket:
          port: 8443
        initialDelaySeconds: 30
        periodSeconds: 10
        failureThreshold: 6
      readinessProbe:
        tcpSocket:
          port: 8443
        initialDelaySeconds: 20
        periodSeconds: 5
        failureThreshold: 3
      resources:
        requests:
          memory: 384Mi
          cpu: "0.35"
        limits:
          memory: 1536Mi
          cpu: "2"

  volumes:
    - name: mosaicfs-config
      hostPath:
        path: /etc/mosaicfs
        type: Directory
    - name: couchdb-data
      persistentVolumeClaim:
        claimName: couchdb-data
    - name: mosaicfs-state
      persistentVolumeClaim:
        claimName: mosaicfs-state
    - name: data
      hostPath:
        path: /data/mosaicfs-test
        type: Directory
