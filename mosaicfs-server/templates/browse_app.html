<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ title | default(value="MosaicFS Browse") }}</title>
<link rel="stylesheet" href="/ui/assets/pico.min.css">
<script src="/ui/assets/htmx.min.js" defer></script>
<style>
  html, body { margin: 0; padding: 0; height: 100%; }
  body { display: flex; flex-direction: column; }
  .toolbar {
    display: flex; align-items: center; gap: 0.5rem;
    padding: 0.5rem 1rem; border-bottom: 1px solid #ccc;
    background: #f8f9fa; flex-shrink: 0;
  }
  .toolbar button { padding: 0.25rem 0.6rem; font-size: 0.9rem; }
  .toolbar button:disabled { opacity: 0.4; cursor: default; }
  .toolbar input[type="text"] {
    margin: 0; padding: 0.25rem 0.5rem; font-size: 0.9rem;
    height: auto;
  }
  #location-bar { flex: 1; font-family: monospace; }
  #search-bar { width: 200px; }
  #flash { padding: 0 1rem; flex-shrink: 0; }
  .flash {
    background: #dbeafe; border-left: 4px solid #2563eb; color: #1e3a8a;
    padding: 0.75rem 1rem; border-radius: 4px; margin: 0.5rem 0;
  }
  #main-content { flex: 1; overflow-y: auto; padding: 0 1rem; }
  .file-row { cursor: default; }
  .file-row td { padding: 0.35rem 0.75rem; }
  .file-name {
    cursor: default;
  }
  .file-name:hover {
    text-decoration: underline;
    cursor: pointer;
  }
  .dir-name {
    cursor: pointer;
  }
  .dir-name:hover {
    text-decoration: underline;
  }
  .sort-header { cursor: pointer; }
  .sort-header:hover { text-decoration: underline; }
  table { margin-top: 0.5rem; }
  thead th { position: sticky; top: 0; background: #f8f9fa; }
  .empty-msg { color: #6c757d; margin-top: 1rem; }
</style>
</head>
<body>

<div class="toolbar">
  <button id="back-btn" disabled onclick="history.back()" title="Back">←</button>
  <button id="fwd-btn" disabled onclick="history.forward()" title="Forward">→</button>
  <form id="location-form" action="/ui/browse/navigate" method="GET"
        hx-get="/ui/browse/navigate" hx-target="#main-content" hx-swap="innerHTML"
        hx-push-url="true" style="display:flex;flex:1;gap:0.5rem;align-items:center">
    <input type="text" id="location-bar" name="path" value="/"
           onfocus="this.select()" placeholder="/path/to/directory">
  </form>
  <input type="text" id="search-bar" name="q"
         hx-get="/ui/browse/list" hx-trigger="keyup changed delay:300ms"
         hx-target="#file-list" hx-include="#location-bar,#sort-hidden,#order-hidden"
         hx-indicator="#search-bar" placeholder="Search…"
         onkeydown="if(event.key==='Escape'){event.preventDefault();this.value='';this.dispatchEvent(new Event('keyup',{bubbles:true}));}">
  <a href="/ui/status" title="Settings" style="display:flex;align-items:center;color:#495057;text-decoration:none;padding:0.25rem 0.3rem;border-radius:4px;line-height:1" onmouseover="this.style.background='#e9ecef'" onmouseout="this.style.background=''"
  ><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg></a>
</div>

<div id="flash">
{% if flash %}<div class="flash">{{ flash }}</div>{% endif %}
</div>

<div id="main-content"
     hx-get="/ui/browse/list"
     hx-trigger="load"
     hx-vals='{"path":"/"}'
     hx-target="#file-list"
     hx-swap="innerHTML">
  <div id="file-list"></div>
</div>

<input type="hidden" id="sort-hidden" name="sort" value="name">
<input type="hidden" id="order-hidden" name="order" value="asc">
<input type="hidden" id="path-hidden" name="path" value="/">

<script>
  var backBtn = document.getElementById('back-btn');
  var fwdBtn = document.getElementById('fwd-btn');
  backBtn.disabled = false;
  fwdBtn.disabled = false;

  document.getElementById('location-form').addEventListener('submit', function(e) {
    var loc = document.getElementById('location-bar').value;
    document.getElementById('path-hidden').value = loc;
    document.getElementById('sort-hidden').value = 'name';
    document.getElementById('order-hidden').value = 'asc';
    document.getElementById('search-bar').value = '';
  });

  document.addEventListener('htmx:afterRequest', function(evt) {
    var path = evt.detail.pathInfo && evt.detail.pathInfo.responsePath;
    if (path) {
      var m = path.match(/[?&]path=([^&]*)/);
      if (m) {
        document.getElementById('location-bar').value = decodeURIComponent(m[1]);
        document.getElementById('path-hidden').value = decodeURIComponent(m[1]);
      }
    }
  });
</script>

</body>
</html>
