{% extends "layout.html" %}
{% block content %}
<h2>Replication</h2>
<section hx-get="/ui/replication/panel" hx-trigger="load, every 10s" hx-swap="innerHTML">
  <p class="muted" aria-busy="true">Loading…</p>
</section>

<article>
  <header><strong>Create replication rule</strong></header>
  <form method="post" action="/ui/replication/rules/create">
    <div class="grid">
      <label>Name
        <input type="text" name="name" placeholder="auto-generated if blank">
      </label>
      <label>Target backend
        <input type="text" name="target_name" required placeholder="backend name">
      </label>
    </div>
    <div class="grid">
      <label>Source node ID
        <input type="text" name="source_node_id" value="*" placeholder="* for all nodes">
      </label>
      <label>Default result
        <select name="default_result">
          <option value="exclude" selected>exclude</option>
          <option value="include">include</option>
        </select>
      </label>
    </div>
    <label>
      <input type="checkbox" name="enabled" value="1" checked>
      Enabled
    </label>
    <button type="submit">Create rule</button>
  </form>
</article>

<article>
  <header><strong>Initiate restore</strong></header>
  <form method="post" action="/ui/replication/restore">
    <div class="grid">
      <label>Target backend
        <input type="text" name="target_name" required>
      </label>
      <label>Source node ID
        <input type="text" name="source_node_id" required>
      </label>
      <label>Destination node ID
        <input type="text" name="destination_node_id" required>
      </label>
    </div>
    <div class="grid">
      <label>Destination path (optional)
        <input type="text" name="destination_path">
      </label>
      <label>Path prefix (optional)
        <input type="text" name="path_prefix">
      </label>
      <label>MIME type (optional)
        <input type="text" name="mime_type">
      </label>
    </div>
    <button type="submit">Start restore</button>
  </form>
</article>
{% endblock content %}
