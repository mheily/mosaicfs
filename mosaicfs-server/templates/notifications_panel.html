{% if items | length == 0 %}
<p class="muted">No active notifications.</p>
{% else %}
<table>
  <thead><tr><th>Severity</th><th>Category</th><th>Title</th><th>Message</th><th>Created</th><th></th></tr></thead>
  <tbody>
    {% for n in items %}
    <tr>
      <td class="{{ n.severity_class }}">{{ n.severity }}</td>
      <td>{{ n.category }}</td>
      <td>{{ n.title }}</td>
      <td class="muted">{{ n.message }}</td>
      <td class="muted">{{ n.created_at }}</td>
      <td>
        <form method="post" action="/ui/notifications/{{ n.id }}/ack" style="margin:0">
          <button type="submit" class="secondary outline" style="padding:0.15rem 0.5rem">Ack</button>
        </form>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endif %}
<p class="muted">Last refresh: {{ now }}</p>
