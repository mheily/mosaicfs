<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ title | default(value="MosaicFS Admin") }}</title>
<link rel="stylesheet" href="/ui/assets/pico.min.css">
<script src="/ui/assets/htmx.min.js" defer></script>
<script>
function confirmReveal(b,c){document.getElementById(b).style.display='none';document.getElementById(c).style.display='inline-flex';}
function confirmCancel(b,c){document.getElementById(c).style.display='none';document.getElementById(b).style.display='';}
</script>
<style>
  .nav-flex { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }
  .nav-flex .spacer { flex: 1; }
  .muted { color: var(--pico-muted-color); }
  .ok { color: var(--pico-color-green-550); }
  .warn { color: var(--pico-color-amber-550); }
  .err { color: var(--pico-color-red-550); }
  .flash {
    background: #dbeafe;
    border-left: 4px solid #2563eb;
    color: #1e3a8a;
    padding: 0.75rem 1rem;
    border-radius: 4px;
    margin-bottom: 1rem;
  }
</style>
</head>
<body>
<main class="container">
{% if authed %}
<nav class="nav-flex">
  <a href="/ui/nodes">Nodes</a>
  <a href="/ui/vfs">VFS</a>
  <a href="/ui/notifications">Notifications</a>
  <a href="/ui/settings/credentials">Settings</a>
  <span class="spacer"></span>
  {% if user %}<span class="muted">{{ user }}</span>{% endif %}
  <form method="post" action="/ui/logout" style="margin:0">
    <button type="submit" class="secondary outline" style="padding:0.25rem 0.75rem">Log out</button>
  </form>
</nav>
<hr>
{% endif %}
{% if flash %}<div class="flash">{{ flash }}</div>{% endif %}
{% block content %}{% endblock content %}
</main>
</body>
</html>
