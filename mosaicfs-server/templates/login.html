{% extends "layout.html" %}
{% block content %}
<article>
  <header><strong>Log in to MosaicFS Admin</strong></header>
  {% if error %}<p class="err">{{ error }}</p>{% endif %}
  <form method="post" action="/ui/login">
    <label>Access Key ID
      <input type="text" name="access_key_id" required autofocus>
    </label>
    <label>Secret Key
      <input type="password" name="secret_key" required>
    </label>
    <button type="submit">Log in</button>
  </form>
</article>
{% endblock content %}
