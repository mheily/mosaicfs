{% extends "layout.html" %}
{% block content %}
<h2>Notifications</h2>
<form method="post" action="/ui/notifications/ack-all" style="margin-bottom:1rem"
      onsubmit="return confirm('Acknowledge all active notifications?');">
  <button type="submit" class="secondary outline">Acknowledge all</button>
</form>
<section hx-get="/ui/notifications/panel" hx-trigger="load, every 10s" hx-swap="innerHTML">
  <p class="muted" aria-busy="true">Loading…</p>
</section>
{% endblock content %}
